<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu"></ion-back-button>
    </ion-buttons>
    <ion-title>Resumo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding" color="light">
  <div class="header-welcome">
    <h2>Dashboard</h2>
    <p>Acompanhamento dos chamados técnicos</p>
  </div>

  <ion-grid class="dashboard-grid">
    <!-- Seção Geral -->
    <ion-row>
      <ion-col size="12" class="ion-text-center">
        <div class="chart-container total-container">
          <h3 class="chart-title">Total de Chamados</h3>
          <circle-progress
            [percent]="100"
            [radius]="80"
            [outerStrokeWidth]="12"
            [innerStrokeWidth]="12"
            [space]="-12"
            [outerStrokeColor]="'var(--ion-color-primary)'"
            [innerStrokeColor]="'var(--ion-color-light-shade)'"
            [animation]="true"
            [animationDuration]="500"
            [title]="resumo.total.toString()"
            [titleFontSize]="'36'"
            [titleFontWeight]="'bold'"
            [titleColor]="'var(--ion-color-dark)'"
            [showSubtitle]="false"
            [showUnits]="false"
          ></circle-progress>
        </div>
      </ion-col>
    </ion-row>

    <div class="section-title">Status</div>
    <!-- Seção Status -->
    <ion-row>
      <!-- Abertos -->
      <ion-col size="6" size-md="3" class="ion-text-center">
        <div class="chart-container clickable-card" (click)="abrirModalPrioridades('Aberto')">
          <circle-progress
            [percent]="getPercent(resumo.abertos)"
            [radius]="50"
            [outerStrokeWidth]="8"
            [innerStrokeWidth]="8"
            [space]="-8"
            [outerStrokeColor]="'#3880ff'"
            [innerStrokeColor]="'#e0e0e0'"
            [animation]="true"
            [animationDuration]="500"
            [title]="resumo.abertos.toString()"
            [titleFontSize]="'24'"
            [titleFontWeight]="'bold'"
            [titleColor]="'var(--ion-color-dark)'"
            [showSubtitle]="false"
            [showUnits]="false"
          ></circle-progress>
          <p class="chart-label">Abertos</p>
        </div>
      </ion-col>

      <!-- Em Atendimento -->
      <ion-col size="6" size-md="3" class="ion-text-center">
        <div class="chart-container clickable-card" (click)="abrirModalPrioridades('Em atendimento')">
          <circle-progress
            [percent]="getPercent(resumo.atendimento)"
            [radius]="50"
            [outerStrokeWidth]="8"
            [innerStrokeWidth]="8"
            [space]="-8"
            [outerStrokeColor]="'#ffc409'"
            [innerStrokeColor]="'#e0e0e0'"
            [animation]="true"
            [animationDuration]="500"
            [title]="resumo.atendimento.toString()"
            [titleFontSize]="'24'"
            [titleFontWeight]="'bold'"
            [titleColor]="'var(--ion-color-dark)'"
            [showSubtitle]="false"
            [showUnits]="false"
          ></circle-progress>
          <p class="chart-label">Em Atendimento</p>
        </div>
      </ion-col>

      <!-- Concluídos -->
      <ion-col size="6" size-md="3" class="ion-text-center">
        <div class="chart-container clickable-card" (click)="abrirModalPrioridades('Concluído')">
          <circle-progress
            [percent]="getPercent(resumo.concluidos)"
            [radius]="50"
            [outerStrokeWidth]="8"
            [innerStrokeWidth]="8"
            [space]="-8"
            [outerStrokeColor]="'#2dd36f'"
            [innerStrokeColor]="'#e0e0e0'"
            [animation]="true"
            [animationDuration]="500"
            [title]="resumo.concluidos.toString()"
            [titleFontSize]="'24'"
            [titleFontWeight]="'bold'"
            [titleColor]="'var(--ion-color-dark)'"
            [showSubtitle]="false"
            [showUnits]="false"
          ></circle-progress>
          <p class="chart-label">Concluídos</p>
        </div>
      </ion-col>

      <!-- Cancelados -->
      <ion-col size="6" size-md="3" class="ion-text-center">
        <div class="chart-container clickable-card" (click)="abrirModalPrioridades('Cancelado')">
          <circle-progress
            [percent]="getPercent(resumo.cancelados)"
            [radius]="50"
            [outerStrokeWidth]="8"
            [innerStrokeWidth]="8"
            [space]="-8"
            [outerStrokeColor]="'#eb445a'"
            [innerStrokeColor]="'#e0e0e0'"
            [animation]="true"
            [animationDuration]="500"
            [title]="resumo.cancelados.toString()"
            [titleFontSize]="'24'"
            [titleFontWeight]="'bold'"
            [titleColor]="'var(--ion-color-dark)'"
            [showSubtitle]="false"
            [showUnits]="false"
          ></circle-progress>
          <p class="chart-label">Cancelados</p>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
