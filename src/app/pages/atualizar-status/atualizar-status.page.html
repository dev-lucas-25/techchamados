<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/detalhes-chamado/' + chamadoId"></ion-back-button>
    </ion-buttons>
    <ion-title>Atualizar Status</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding" color="light">
  <ion-card class="form-card">
    <ion-card-header>
      <ion-card-title>Status do Chamado #{{ chamadoId }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-item>
        <ion-select label="Novo Status" labelPlacement="floating" [(ngModel)]="novoStatus">
          <ion-select-option value="Aberto">Aberto</ion-select-option>
          <ion-select-option value="Em atendimento">Em atendimento</ion-select-option>
          <ion-select-option value="Concluído">Concluído</ion-select-option>
          <ion-select-option value="Cancelado">Cancelado</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-textarea label="Adicionar Observação" labelPlacement="floating" [(ngModel)]="novaObservacao" rows="5" placeholder="Digite aqui o que foi feito ou o motivo da mudança..."></ion-textarea>
      </ion-item>

      <div class="action-buttons ion-margin-top">
        <ion-button expand="block" color="secondary" shape="round" (click)="salvarAtualizacao()">
          <ion-icon slot="start" name="checkmark-done-outline"></ion-icon>
          Salvar Alterações
        </ion-button>
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>
