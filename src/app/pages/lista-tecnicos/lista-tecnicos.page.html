<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu"></ion-back-button>
    </ion-buttons>
    <ion-title>Lista de Técnicos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding" color="light">
  <div *ngIf="tecnicos.length === 0" class="empty-state">
    <ion-icon name="people-outline"></ion-icon>
    <h3>Nenhum técnico encontrado</h3>
    <p>Você não possui técnicos cadastrados no momento.</p>
    <ion-button routerLink="/cadastro-tecnico" color="tertiary">Novo Técnico</ion-button>
  </div>

  <ion-list class="tecnico-list" *ngIf="tecnicos.length > 0">
    <ion-item-sliding *ngFor="let tecnico of tecnicos">
      <ion-item class="tecnico-item">
        <ion-avatar slot="start" class="initial-avatar">
          <span>{{ tecnico.nome.charAt(0).toUpperCase() }}</span>
        </ion-avatar>
        
        <ion-label>
          <h2>{{ tecnico.nome }}</h2>
          <p>{{ tecnico.especialidade }} • {{ tecnico.contato }}</p>
        </ion-label>
        
        <ion-badge slot="end" [color]="tecnico.situacao === 'Ativo' ? 'success' : 'medium'">
          {{ tecnico.situacao }}
        </ion-badge>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="confirmarExclusao(tecnico.id)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button routerLink="/cadastro-tecnico" color="tertiary">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
