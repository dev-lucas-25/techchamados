<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu"></ion-back-button>
    </ion-buttons>
    <ion-title>Lista de Técnicos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding" color="light">
  <div *ngIf="tecnicos.length === 0" class="empty-state">
    <ion-icon name="people-outline"></ion-icon>
    <h3>Nenhum técnico encontrado</h3>
    <p>Você não possui técnicos cadastrados no momento.</p>
    <ion-button routerLink="/cadastro-tecnico" color="tertiary">Novo Técnico</ion-button>
  </div>

  <div class="tecnico-list" *ngIf="tecnicos.length > 0">
    <ion-card class="tecnico-card" *ngFor="let tecnico of tecnicos" [ngClass]="{'tecnico-inativo': tecnico.situacao === 'Inativo'}">
      <ion-item class="tecnico-item" lines="none">
        <ion-avatar slot="start" class="initial-avatar">
          <span>{{ tecnico.nome.charAt(0).toUpperCase() }}</span>
        </ion-avatar>
        
        <ion-label>
          <h2>{{ tecnico.nome }}</h2>
          <p>{{ tecnico.especialidade }} • {{ tecnico.contato }}</p>
        </ion-label>
        
        <ion-badge slot="end" [color]="tecnico.situacao === 'Ativo' ? 'success' : 'medium'">
          {{ tecnico.situacao }}
        </ion-badge>
      </ion-item>

      <div class="action-buttons">
        <ion-button size="small" fill="outline" color="warning" *ngIf="tecnico.situacao === 'Ativo'" (click)="alterarSituacao(tecnico)">
          <ion-icon slot="start" name="power"></ion-icon>
          Desativar
        </ion-button>
        
        <ion-button size="small" fill="outline" color="success" *ngIf="tecnico.situacao === 'Inativo'" (click)="alterarSituacao(tecnico)">
          <ion-icon slot="start" name="refresh"></ion-icon>
          Reativar
        </ion-button>

        <ion-button size="small" fill="clear" color="danger" *ngIf="podeExcluir(tecnico)" (click)="excluirTecnico(tecnico)">
          <ion-icon slot="start" name="trash"></ion-icon>
          Excluir
        </ion-button>
      </div>
    </ion-card>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button routerLink="/cadastro-tecnico" color="tertiary">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
